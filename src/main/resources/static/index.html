<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitReserve</title>
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            color: #1f2933;
        }
        body { margin: 0; min-height: 100vh; background: #f4f6f8; }
        header { background: #12343b; color: white; padding: 24px 32px; }
        h1, h2, h3, p { margin: 0; }
        header p { margin-top: 8px; color: #d6e3e6; }
        main { max-width: 1180px; margin: 0 auto; padding: 24px 18px 48px; }
        .layout { display: grid; grid-template-columns: minmax(280px, 360px) 1fr; gap: 18px; align-items: start; }
        .panel, .card { background: white; border: 1px solid #d9e2e7; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        .panel { padding: 16px; margin-bottom: 16px; }
        .panel h2 { font-size: 20px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
        .card { padding: 16px; }
        .card h3 { font-size: 18px; margin-bottom: 10px; }
        .meta { color: #52616b; line-height: 1.55; font-size: 14px; }
        label { display: block; font-size: 13px; color: #394b59; margin: 10px 0 5px; font-weight: 700; }
        input, select { width: 100%; box-sizing: border-box; border: 1px solid #c8d2d8; border-radius: 6px; padding: 10px; font-size: 14px; background: white; }
        button { border: 0; border-radius: 6px; padding: 10px 12px; font-weight: 700; cursor: pointer; background: #0f766e; color: white; margin-top: 12px; }
        button.secondary { background: #334155; }
        button.danger { background: #b42318; }
        button:disabled { opacity: .55; cursor: not-allowed; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .status { padding: 10px 12px; border-radius: 6px; background: #e7f3f5; color: #12343b; margin: 10px 0 14px; font-size: 14px; line-height: 1.4; }
        .status.error { background: #fff1f0; color: #7a1f16; }
        .tag { display: inline-block; margin-bottom: 10px; padding: 4px 8px; border-radius: 999px; background: #e7f3f5; color: #12343b; font-size: 12px; font-weight: 700; }
        .section-title { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin: 4px 0 14px; }
        .section-title h2 { font-size: 22px; }
        .muted { color: #64748b; font-size: 13px; }
        .hidden { display: none; }
        @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } header { padding: 20px; } }
    </style>
</head>
<body>
<header>
    <h1>FitReserve</h1>
    <p>Gestiona usuarios, salas, clases y reservas desde una pantalla sencilla.</p>
</header>
<main>
    <div id="globalStatus" class="status">Cargando datos...</div>
    <div class="layout">
        <aside>
            <section class="panel">
                <h2>Registrar Usuario</h2>
                <label for="regNombre">Nombre</label>
                <input id="regNombre" value="Pedro">
                <label for="regEmail">Email</label>
                <input id="regEmail" value="pedro@test.com">
                <label for="regPassword">Password</label>
                <input id="regPassword" value="123456" type="password">
                <label for="regRol">Rol</label>
                <select id="regRol">
                    <option value="MEMBER">MEMBER</option>
                    <option value="TRAINER">TRAINER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <button onclick="registerUser()">Registrar</button>
            </section>

            <section class="panel">
                <h2>Iniciar Sesion</h2>
                <label for="loginEmail">Email</label>
                <input id="loginEmail" value="admin@test.com">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" value="123456" type="password">
                <div class="row">
                    <button onclick="login()">Entrar</button>
                    <button class="secondary" onclick="logout()">Salir</button>
                </div>
                <p id="sessionInfo" class="muted" style="margin-top:10px">Sin sesion iniciada.</p>
            </section>

            <section class="panel">
                <h2>Crear Sala</h2>
                <p class="muted">Necesitas iniciar sesion como ADMIN.</p>
                <label for="salaNombre">Nombre</label>
                <input id="salaNombre" value="Sala Pilates">
                <label for="salaCapacidad">Capacidad maxima</label>
                <input id="salaCapacidad" value="15" type="number" min="1">
                <label for="salaUbicacion">Ubicacion</label>
                <input id="salaUbicacion" value="Tercera planta">
                <button onclick="createSala()">Crear sala</button>
            </section>
        </aside>

        <section>
            <div class="section-title">
                <h2>Salas</h2>
                <button class="secondary" onclick="loadAll()">Actualizar</button>
            </div>
            <div id="salas" class="grid"></div>

            <div class="section-title" style="margin-top:28px">
                <h2>Clases</h2>
                <span class="muted">Para reservar, inicia sesion como MEMBER.</span>
            </div>
            <div id="clases" class="grid"></div>

            <div class="section-title" style="margin-top:28px">
                <h2>Mis Reservas</h2>
            </div>
            <div id="reservas" class="grid"></div>
        </section>
    </div>
</main>
<script>
    const state = {
        token: localStorage.getItem('fitreserveToken') || '',
        email: localStorage.getItem('fitreserveEmail') || '',
        rol: localStorage.getItem('fitreserveRol') || ''
    };

    function el(id) { return document.getElementById(id); }
    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
    }
    function setStatus(message, isError = false) {
        const box = el('globalStatus');
        box.textContent = message;
        box.className = isError ? 'status error' : 'status';
    }
    function authHeaders() {
        return state.token ? { Authorization: `Bearer ${state.token}` } : {};
    }
    async function requestJson(url, options = {}) {
        const response = await fetch(url, options);
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || JSON.stringify(data) || response.statusText);
        return data;
    }
    function updateSessionInfo() {
        el('sessionInfo').textContent = state.token ? `Sesion: ${state.email} (${state.rol})` : 'Sin sesion iniciada.';
    }
    async function registerUser() {
        try {
            const payload = {
                nombre: el('regNombre').value,
                email: el('regEmail').value,
                password: el('regPassword').value,
                rol: el('regRol').value
            };
            const data = await requestJson('/auth/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            setStatus(`Usuario registrado: ${data.email} (${data.rol})`);
            el('loginEmail').value = payload.email;
            el('loginPassword').value = payload.password;
        } catch (error) { setStatus(error.message, true); }
    }
    async function login() {
        try {
            const payload = { email: el('loginEmail').value, password: el('loginPassword').value };
            const data = await requestJson('/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            state.token = data.token; state.email = data.email; state.rol = data.rol;
            localStorage.setItem('fitreserveToken', state.token);
            localStorage.setItem('fitreserveEmail', state.email);
            localStorage.setItem('fitreserveRol', state.rol);
            updateSessionInfo();
            setStatus(`Sesion iniciada como ${state.email} (${state.rol})`);
            await loadReservas();
        } catch (error) { setStatus(error.message, true); }
    }
    function logout() {
        state.token = ''; state.email = ''; state.rol = '';
        localStorage.removeItem('fitreserveToken');
        localStorage.removeItem('fitreserveEmail');
        localStorage.removeItem('fitreserveRol');
        updateSessionInfo();
        el('reservas').innerHTML = '<div class="card">Inicia sesion para ver tus reservas.</div>';
        setStatus('Sesion cerrada.');
    }
    async function createSala() {
        try {
            const payload = {
                nombre: el('salaNombre').value,
                capacidadMaxima: Number(el('salaCapacidad').value),
                ubicacion: el('salaUbicacion').value
            };
            await requestJson('/api/salas', {
                method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeaders() }, body: JSON.stringify(payload)
            });
            setStatus('Sala creada correctamente.');
            await loadSalas();
        } catch (error) { setStatus(error.message, true); }
    }
    async function reservar(claseId) {
        try {
            await requestJson(`/api/reservas/clases/${claseId}`, { method: 'POST', headers: authHeaders() });
            setStatus('Reserva creada correctamente.');
            await loadReservas();
        } catch (error) { setStatus(error.message, true); }
    }
    async function loadSalas() {
        const salas = await requestJson('/api/salas');
        el('salas').innerHTML = salas.map(sala => `
            <article class="card">
                <h3>${escapeHtml(sala.nombre)}</h3>
                <div class="meta">Capacidad: ${escapeHtml(sala.capacidadMaxima)}<br>Ubicacion: ${escapeHtml(sala.ubicacion)}</div>
            </article>
        `).join('') || '<div class="card">No hay salas.</div>';
    }
    async function loadClases() {
        const clases = await requestJson('/api/clases');
        el('clases').innerHTML = clases.map(clase => `
            <article class="card">
                <span class="tag">${escapeHtml(clase.tipo)}</span>
                <h3>${escapeHtml(clase.nombre)}</h3>
                <div class="meta">
                    Sala: ${escapeHtml(clase.salaNombre)}<br>
                    Entrenador: ${escapeHtml(clase.entrenadorNombre)}<br>
                    Inicio: ${escapeHtml(clase.fechaInicio)}<br>
                    Nivel: ${escapeHtml(clase.nivelIntensidad)}
                </div>
                <button onclick="reservar(${clase.id})">Reservar</button>
            </article>
        `).join('') || '<div class="card">No hay clases.</div>';
    }
    async function loadReservas() {
        if (!state.token) {
            el('reservas').innerHTML = '<div class="card">Inicia sesion para ver tus reservas.</div>';
            return;
        }
        const reservas = await requestJson('/api/reservas/mis-reservas', { headers: authHeaders() });
        const list = Array.isArray(reservas) ? reservas : [reservas];
        el('reservas').innerHTML = list.map(reserva => `
            <article class="card">
                <h3>${escapeHtml(reserva.nombreClase)}</h3>
                <div class="meta">Estado: ${escapeHtml(reserva.estado)}<br>Inicio: ${escapeHtml(reserva.fechaInicio)}</div>
            </article>
        `).join('') || '<div class="card">No hay reservas.</div>';
    }
    async function loadAll() {
        try {
            await Promise.all([loadSalas(), loadClases()]);
            await loadReservas();
            setStatus('Datos cargados correctamente.');
        } catch (error) { setStatus(error.message, true); }
    }

    updateSessionInfo();
    loadAll();
</script>
</body>
</html>
